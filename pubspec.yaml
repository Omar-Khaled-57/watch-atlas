name: watch_atlas
description: "WatchAtlas - Modern media tracking platform"
publish_to: 'none'
version: 0.9.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.3.0

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^7.2.0

  # Data Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # Image Caching
  cached_network_image: ^3.4.1

  # Animations
  flutter_animate: ^4.5.2
  lottie: ^3.3.1
  shimmer: ^3.0.0

  # UI
  dynamic_color: ^1.7.0
  flutter_local_notifications: ^22.0.1

  # Environment
  flutter_dotenv: ^6.0.1
  shared_preferences: ^2.3.5

  # Pagination
  infinite_scroll_pagination: ^5.1.1

  # Backend
  supabase_flutter: ^2.8.4

  # Notifications
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1

  # Analytics
  firebase_analytics: ^12.4.3

  # Markdown
  flutter_markdown: ^0.7.6

  # Charts
  fl_chart: ^1.2.0

  # Auth
  google_sign_in: any
  sign_in_with_apple: any

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^13.2.0
  image_picker: ^1.1.2
  flutter_cache_manager: ^3.4.1
  postgrest: ^2.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.5
  riverpod_generator: ^4.0.3
  mocktail: any
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo/logo.png"
  adaptive_icon_background: "#0F111A"
  adaptive_icon_foreground: "assets/images/logo/logo.png"
  remove_alpha_ios: true
  web:
    generate: true
    background_color: "#0F111A"
    theme_color: "#E11D48"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
    - assets/images/logo/
    - assets/images/icons/
    - assets/images/pfp/
